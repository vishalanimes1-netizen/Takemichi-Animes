<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please Wait - Your Download is Ready</title>
    <link rel="stylesheet" href="style/download.css">
</head>
<body>
    <div class="thank-you-container">
        <div class="success-animation"></div>
        
        <h1>Almost There!</h1>
        <p>Please support us by viewing this quick ad</p>
        
        <!-- Ad Container 1 (Leaderboard) -->
        <div class="ad-container">
            <div class="ad-label">Advertisement</div>
            <div id="ad-space-1" class="ad-space">
                <!-- Ad will be inserted here -->
                <div id="ad-content"></div>
            </div>
        </div>
        
        <!-- Download Progress -->
        <div class="download-progress">
            <h3>Your download will start after the ad</h3>
            
            <div class="timer" id="timer">15</div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <p>Please wait while we prepare your download...</p>
            
            <button class="skip-ad" id="skipBtn" disabled>
              ⏰ Wait for timer 
            </button>
        </div>
        
        <!-- Ad Container 2l (Rectangle) - Optional -->
        <div class="ad-container">
            <div class="ad-label">More from our sponsors</div>
            <div id="ad-space-2" class="ad-space" style="min-height: 90px;">
                <!-- Second ad space -->
            </div>
            <div id="ad-space-3" class="ad-space" style="min-height: 90px;">
                <!-- Second ad space -->
            </div>
            <div id="ad-space-4" class="ad-space" style="min-height: 90px;">
                <!-- Second ad space -->
            </div>
        </div>
        
        
        <p class="small">
            <a href="index.html">← Cancel and go back</a>
        </p>
    </div>
    
    <script src="script/ads.js"></script>
    <script src="script/download.js"></script>
</body>
</html>
